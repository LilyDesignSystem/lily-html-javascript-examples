<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Form — Lily Design System</title>
  <link rel="stylesheet" href="../assets/css/nhs.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="header" aria-label="Site header">
    <h1>File Upload</h1>
    <nav class="navigation-menu" aria-label="Main navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="file-upload-form.html" aria-current="page">File Upload</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content" class="page-wrapper">
    <form class="form" aria-label="File upload" id="upload-form">
      <h1>Upload Documents</h1>

      <div id="upload-alert" class="alert" role="alert" aria-label="Upload complete" data-type="success" hidden>
        <h2>Upload complete</h2>
        <p><span id="upload-file-count">0</span> file(s) uploaded successfully.</p>
      </div>

      <div class="field" aria-label="Select files field">
        <label class="label" for="file-input">Select files</label>
        <div class="file-upload" aria-label="Choose files to upload">
          <input class="file-input" type="file" id="file-input" aria-label="Choose files" accept=".pdf,.doc,.docx,.txt" multiple>
        </div>
      </div>

      <div id="file-list-section" hidden>
        <h2>Selected files</h2>
        <ul id="file-list"></ul>
      </div>

      <progress class="progress" aria-label="Upload progress" max="100" value="0" id="upload-progress" hidden>0%</progress>

      <button class="button" type="submit" aria-label="Upload Files" id="upload-btn" disabled>Upload Files</button>
    </form>
  </main>

  <footer class="footer" aria-label="Site footer">
    <p>&copy; 2026 Lily Design System. All rights reserved.</p>
  </footer>

  <script>
    (function() {
      'use strict';

      var files = [];
      var fileInput = document.getElementById('file-input');
      var fileList = document.getElementById('file-list');
      var fileListSection = document.getElementById('file-list-section');
      var uploadBtn = document.getElementById('upload-btn');
      var progressBar = document.getElementById('upload-progress');
      var uploadAlert = document.getElementById('upload-alert');
      var uploading = false;
      var done = false;

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function renderFiles() {
        fileList.innerHTML = '';
        files.forEach(function(file, index) {
          var li = document.createElement('li');
          li.textContent = file.name + ' ';
          var badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = formatSize(file.size);
          li.appendChild(badge);
          if (!uploading && !done) {
            var removeBtn = document.createElement('button');
            removeBtn.className = 'button';
            removeBtn.textContent = 'Remove';
            removeBtn.setAttribute('aria-label', 'Remove ' + file.name);
            removeBtn.addEventListener('click', function() {
              files.splice(index, 1);
              renderFiles();
            });
            li.appendChild(document.createTextNode(' '));
            li.appendChild(removeBtn);
          }
          fileList.appendChild(li);
        });
        fileListSection.hidden = files.length === 0;
        uploadBtn.disabled = files.length === 0 || uploading || done;
      }

      fileInput.addEventListener('change', function() {
        var newFiles = Array.from(fileInput.files).map(function(f) {
          return { name: f.name, size: f.size };
        });
        files = files.concat(newFiles);
        renderFiles();
        fileInput.value = '';
      });

      document.getElementById('upload-form').addEventListener('submit', function(e) {
        e.preventDefault();
        if (files.length === 0 || uploading || done) return;

        uploading = true;
        uploadBtn.disabled = true;
        uploadBtn.textContent = 'Uploading...';
        progressBar.hidden = false;
        progressBar.value = 0;
        renderFiles();

        var progress = 0;
        var interval = setInterval(function() {
          progress += 10;
          progressBar.value = progress;
          if (progress >= 100) {
            clearInterval(interval);
            uploading = false;
            done = true;
            document.getElementById('upload-file-count').textContent = files.length;
            uploadAlert.hidden = false;
            uploadBtn.textContent = 'Upload Files';
            renderFiles();
          }
        }, 300);
      });
    })();
  </script>
</body>
</html>
